<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Protocol Initiation — Class 10Edu</title>
<link rel="stylesheet" href="css/style.css">
<style>
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.role-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  width: 100%;
  max-width: 700px;
}
.role-card {
  text-align: center;
  padding: 48px 32px;
  cursor: pointer;
}
.role-icon { font-size: 4rem; margin-bottom: 24px; display: block; }
</style>
</head>
<body class="login-page">

<div class="ambient-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="login-container au">
  <div style="text-align:center;margin-bottom:64px">
    <div class="nav-gem" style="width:64px;height:64px;margin:0 auto 24px;font-size:32px">V</div>
    <h1 class="grad-text" style="font-size:3rem">PROTOCOL INITIATION</h1>
    <p style="color:var(--ink-dim);margin-top:12px">Select your access level to begin the neural sync.</p>
  </div>

  <div class="role-grid">
    <div class="glass-card role-card" onclick="selectRole('student')">
      <span class="role-icon">🎓</span>
      <h3>STUDENT</h3>
      <p style="font-size:0.8rem;color:var(--ink-dim);margin-top:12px">Access learning modules & path</p>
    </div>
    <div class="glass-card role-card" onclick="selectRole('teacher')">
      <span class="role-icon">👨‍🏫</span>
      <h3>TEACHER</h3>
      <p style="font-size:0.8rem;color:var(--ink-dim);margin-top:12px">Manage exams & curriculum</p>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
function selectRole(role) {
  localStorage.setItem('vm_user_role', role);
  window.location.href = 'dashboard.html';
}
document.addEventListener('DOMContentLoaded', () => {
  App.initTilt();
});
</script>

</body>
</html>
