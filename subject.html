<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Subject Interface — Class 10Edu</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nb"></div>
<div class="page-layout">
  <div id="sb"></div>
  <main class="main-area" id="mainArea">
    <div class="page-head au">
      <h1 id="subjName" class="grad-text">Loading Nexus...</h1>
      <p id="subjDesc" style="color:var(--ink-dim)">Synchronizing data streams...</p>
    </div>

    <div id="chGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:24px" class="au-1">
      <!-- Populated by JS -->
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/security.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const sid = App.getParam('id');
  if(!sid) { location.href='dashboard.html'; return; }
  
  App.initPage(sid);
  const data = await App.loadData();
  const subj = App.getSubject(sid);
  if(!subj) { location.href='dashboard.html'; return; }

  document.getElementById('subjName').textContent = subj.name;
  document.getElementById('subjDesc').textContent = subj.description;

  const grid = document.getElementById('chGrid');
  grid.innerHTML = subj.chapters.map((ch, i) => `
    <div class="glass-card" onclick="location.href='chapter.html?subject=${sid}&chapter=${ch.id}'" style="cursor:pointer;animation-delay:${i*100}ms">
      <div style="font-size:0.75rem;font-weight:800;color:var(--accent-1);margin-bottom:12px">MODULE ${ch.id}</div>
      <h3 style="margin-bottom:16px">${VidyaSec.sanitize(ch.title)}</h3>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="btn-glow" style="padding:8px 16px;font-size:0.8rem">Initiate Sync</div>
      </div>
    </div>
  `).join('');
  
  App.initTilt();
});
</script>
</body>
</html>
